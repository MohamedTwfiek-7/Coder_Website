<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="/script.js" defer></script>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
  </head>

  <body>
    <a href="#main-content" class="visually-hidden skip"
      >Skip to main content</a
    >

    <header class="topnav">
      <div class="wrapper topnav__wrapper">
        <a href="/" class="topnav__homelink">
          <img
            src="/img/logo-mythos.svg"
            width="128"
            height="36"
            alt="mythos Home page"
            class="topnav__logo"
          />
        </a>

        <nav>
          <ul class="topnav__links">
            <li class="topnav__item">
              <a href="" class="topnav__link">features</a>
            </li>
            <li class="topnav__item">
              <a href="" class="topnav__link">Pricing</a>
            </li>
            <li class="topnav__item">
              <a href="" class="topnav__link">About</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>
    <section id="main-content" class="hero">
        <div class="wrapper hero__wrapper">
          <img
            src="/img/unicorn (1).svg"
            alt="hero image"
            width="200"
            height="205"
            class="hero__image"
          />
          <div class="hero__content">
            <h1 class="hero__header">Find that elusive unicorn.</h1>
            <p class="hero__paragraph">
              Mythos will enable you to discover the newest startups to invest
              in. Powered by AI, used by millions of humans.
            </p>
            <div class="hero__buttons">
              <a href="/" class="button hero__button__primary">Free Trial</a>
              <a href="/" class="button hero__button__secondary">Pricing</a>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer>
      <h2 class="visually-hidden">Footer</h2>
    </footer>
  </body>
</html>
